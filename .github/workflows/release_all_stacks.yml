name: release all stacks

on:
  workflow_call:
    inputs:
      STACK_NAME:
        required: true
        type: string
      TARGET_ENVIRONMENT:
        required: true
        type: string
      VERSION_NUMBER:
        required: true
        type: string
      COMMIT_ID:
        required: true
        type: string
      CDK_APP_NAME:
        required: true
        type: string
      DEPLOY_CODE:
        type: boolean
        default: true
      LOG_RETENTION_IN_DAYS:
        required: true
        type: string
      LOG_LEVEL:
        required: true
        type: string
      RUN_REGRESSION_TESTS:
        type: boolean
        default: true
      IS_PULL_REQUEST:
        type: boolean
        default: false
      FORWARD_CSOC_LOGS:
        type: boolean
        required: true
      pinned_image:
        type: string
        required: true
    secrets:
      CLOUD_FORMATION_DEPLOY_ROLE:
        required: true
      DEV_CLOUD_FORMATION_CHECK_VERSION_ROLE:
        required: false
      INT_CLOUD_FORMATION_CHECK_VERSION_ROLE:
        required: false
      PROD_CLOUD_FORMATION_CHECK_VERSION_ROLE:
        required: false
      DEV_CLOUD_FORMATION_EXECUTE_LAMBDA_ROLE:
        required: false
      INT_ASSIST_ME_DOCUMENT_SYNC_ROLE:
        required: false
      PROD_CLOUD_FORMATION_EXECUTE_LAMBDA_ROLE:
        required: false
      REGRESSION_TESTS_PEM:
        required: false
      ASSIST_ME_REGRESSION_TEST_ROLE:
        required: false
      SLACK_BOT_TOKEN:
        required: false
      SLACK_SIGNING_SECRET:
        required: false

permissions: {}

jobs:
  release_all_code:
    runs-on: ubuntu-22.04
    container:
      image: ${{ inputs.pinned_image }}
      options: --user 1001:1001 --group-add 128
    defaults:
      run:
        shell: bash
    environment: ${{ inputs.TARGET_ENVIRONMENT }}
    name: deploy cdk app ${{ inputs.CDK_APP_NAME }}
    permissions:
      id-token: write
      contents: write
    steps:
      - name: copy .tool-versions
        run: |
          cp /home/vscode/.tool-versions "$HOME/.tool-versions"
      - name: Checkout local github actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0
          sparse-checkout: |
            .github

      - name: build_artifact download
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: build_artifact

      - name: extract build_artifact
        run: |
          mkdir -p .build
          tar -xf artifact.tar -C .build

      - name: Configure AWS Credentials
        id: connect_aws_for_deployment
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          aws-region: eu-west-2
          role-to-assume: ${{ secrets.CLOUD_FORMATION_DEPLOY_ROLE }}
          role-session-name: eps-assist-me-deployment
          output-credentials: true

      - name: fix cdk.json for deployment
        run: |
          ./.github/scripts/fix_cdk_json.sh .build/epsam_app.json
        env:
          ACCOUNT_ID: "${{ env.ACCOUNT_ID }}"
          STACK_NAME: "${{ inputs.STACK_NAME }}"
          VERSION_NUMBER: "${{ inputs.VERSION_NUMBER }}"
          COMMIT_ID: "${{ inputs.COMMIT_ID }}"
          LOG_RETENTION_IN_DAYS: "${{ inputs.LOG_RETENTION_IN_DAYS }}"
          LOG_LEVEL: "${{ inputs.LOG_LEVEL }}"
          SLACK_BOT_TOKEN: "${{ secrets.SLACK_BOT_TOKEN }}"
          SLACK_SIGNING_SECRET: "${{ secrets.SLACK_SIGNING_SECRET }}"
          CDK_APP_NAME: ${{ inputs.CDK_APP_NAME }}
          FORWARD_CSOC_LOGS: ${{ inputs.FORWARD_CSOC_LOGS }}
          IS_PULL_REQUEST: ${{ inputs.IS_PULL_REQUEST }}
          RUN_REGRESSION_TESTS: ${{ inputs.RUN_REGRESSION_TESTS }}

      - name: Deploy code for stack
        if: ${{ inputs.DEPLOY_CODE == true }}
        run: |
          cd .build
          npx cdk deploy \
          --app "npx ts-node --prefer-ts-exts packages/cdk/bin/EpsAssistMeApp.ts" \
          --all \
          --require-approval=never \
          --ci true
        shell: bash
        env:
          CONFIG_FILE_NAME: "epsam_app.json"

      - name: Normalize Environment Name
        if: ${{ inputs.TARGET_ENVIRONMENT != 'int' && (inputs.DEPLOY_CODE == true ||
          inputs.IS_PULL_REQUEST == true) }}
        run: |
          # Convert TARGET_ENVIRONMENT to Uppercase (e.g., 'prod' -> 'PROD')
          VAL=$(echo "$TARGET_ENVIRONMENT" | tr '[:lower:]' '[:upper:]')
          echo "UPPER_TARGET_ENVIRONMENT=$VAL" >> "$GITHUB_OUTPUT"
        env:
          TARGET_ENVIRONMENT: ${{ inputs.TARGET_ENVIRONMENT }}

      - name: Sync Documents
        uses: ./.github/actions/sync_documents
        if: ${{ (inputs.TARGET_ENVIRONMENT != 'int') && (inputs.DEPLOY_CODE == true ||
          inputs.IS_PULL_REQUEST == true) }}
        with:
          TARGET_ENVIRONMENT: ${{ inputs.TARGET_ENVIRONMENT }}
          STACK: ${{ inputs.STACK_NAME }}
          INT_ASSIST_ME_DOCUMENT_SYNC_ROLE: ${{ secrets.INT_ASSIST_ME_DOCUMENT_SYNC_ROLE }}
          TARGET_CLOUD_FORMATION_DEPLOY_ROLE: ${{ secrets.CLOUD_FORMATION_DEPLOY_ROLE }}
          PURGE_ENVIRONMENT: ${{ inputs.TARGET_ENVIRONMENT == 'prod' }}

  update_github_pages:
    runs-on: ubuntu-22.04
    if: ${{ inputs.IS_PULL_REQUEST == false && always() && !failure() &&
      !cancelled() }}
    needs: [ release_all_code ]
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout gh-pages
        if: ${{ inputs.IS_PULL_REQUEST == false }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: gh-pages
          path: gh-pages
          persist-credentials: true

      - name: update release tag in github pages
        if: ${{ inputs.IS_PULL_REQUEST == false }}
        run: |
          cd gh-pages
          NOW=$(date +'%Y-%m-%dT%H:%M:%S')
          echo "tag,release_datetime" > "_data/${TARGET_ENVIRONMENT}_latest.csv"
          echo "${VERSION_NUMBER},${NOW}" >> "_data/${TARGET_ENVIRONMENT}_latest.csv"
          echo "${VERSION_NUMBER},${NOW}" >> "_data/${TARGET_ENVIRONMENT}_deployments.csv"
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add "_data/${TARGET_ENVIRONMENT}_latest.csv"
          git add "_data/${TARGET_ENVIRONMENT}_deployments.csv"
          git commit -m "update releases for ${TARGET_ENVIRONMENT} environment"
          parallel --retries 10 --delay 3 ::: "git pull --rebase && git push"
        env:
          TARGET_ENVIRONMENT: ${{ inputs.TARGET_ENVIRONMENT }}
          VERSION_NUMBER: ${{ inputs.VERSION_NUMBER }}

  regression_tests:
    name: Regression Tests
    uses: ./.github/workflows/run_regression_tests.yml
    if: ${{ always() && !failure() && !cancelled() && inputs.RUN_REGRESSION_TESTS ==
      true }}
    permissions:
      id-token: write
      contents: write
    needs: [ release_all_code ]
    with:
      ENVIRONMENT: ${{ inputs.TARGET_ENVIRONMENT }}
      VERSION_NUMBER: ${{ inputs.VERSION_NUMBER }}
      pinned_image: ${{ inputs.pinned_image }}
    secrets:
      REGRESSION_TESTS_PEM: ${{ secrets.REGRESSION_TESTS_PEM }}

  chatbot_evaluation:
    name: Chatbot RAG Evaluation
    runs-on: ubuntu-22.04
    container:
      image: ${{ inputs.pinned_image }}
      options: --user 1001:1001 --group-add 128
    defaults:
      run:
        shell: bash
    if: ${{ always() && !failure() && !cancelled() && inputs.IS_PULL_REQUEST == true
      }}
    needs: [ release_all_code ]
    permissions:
      id-token: write
      contents: read
    steps:
      - name: copy .tool-versions
        run: |
          cp /home/vscode/.tool-versions "$HOME/.tool-versions"

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          aws-region: eu-west-2
          role-to-assume: ${{ secrets.ASSIST_ME_REGRESSION_TEST_ROLE }}
          role-session-name: eps-assist-me-evaluation

      - name: Install dependencies
        run: |
          make install-python

      - name: Run evaluation
        env:
          CHATBOT_STACK_NAME: ${{ inputs.STACK_NAME }}
          AWS_REGION: eu-west-2
        run: |
          make eval-full
